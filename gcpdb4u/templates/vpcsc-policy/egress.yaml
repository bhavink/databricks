# Make sure to update it as per your region and identities before using it
# https://docs.databricks.com/gcp/en/resources/ip-domain-region#private-service-connect-psc-attachment-uris-and-project-numbers
# Find your regional control plane VPC host project
# If your workspace url is 31171674993667.7.gcp.databricks.com
# WORKSPACEID = 311716749948597

##############################################################################
# egress rules for Databricks runtime images and artifacts
# applicable to service or workspace project
##############################################################################
- egressTo:
    operations:
      - serviceName: compute.googleapis.com
        methodSelectors:
          - method: 'InstancesService.BulkInsert'
    resources:
      # Databricks runtime image storage
      - projects/323146983994 # Databricks VM images from a storage account hosted in the global GCP project `databricks-external-images`
  egressFrom:
    identities:
    # ex: db-311716749948597@prod-gcp-us-east1.iam.gserviceaccount.com
    - serviceAccount:db-[WORKSPACEID]@prod-gcp-[GEO]-[REGION].iam.gserviceaccount.com
##############################################################################
# egress rule to provision Databricks clusters (gce instances)
# Needed for cluster creation
# Applicable to host or vpc project
##############################################################################
- egressTo:
    operations:
      - serviceName: storage.googleapis.com
        methodSelectors:
          # access databricks runtime binaries
          - method: google.storage.objects.get
          - method: google.storage.buckets.testIamPermissions
          # health logs
          - method: google.storage.objects.create 
    resources:
      # Databricks cluster boostarp artifacts
      - projects/[databricks control plane project]  # Databricks regional control plane project, shown here for us-east1
  egressFrom:
    identities:
    # per region service account delegate-sa@prod-gcp-[GEO]-[REGION].iam.gserviceaccount.com
    - serviceAccount:delegate-sa@prod-gcp-[GEO]-[REGION].iam.gserviceaccount.com
##############################################################################
# egress rule for accessing system tables
##############################################################################
- egressTo:
    operations:
      - serviceName: storage.googleapis.com
        methodSelectors:
          - method: google.storage.objects.get
    resources:
      - projects/68598579867  # Databricks regional system tables project, shown here for us-east1
  egressFrom:
    identities:
    # per region google service account, shown here for us-east1 system tables access
    - serviceAccount:db-uc-storage-066pptsgmg-dkbon@uc-useast1.iam.gserviceaccount.com
# egress rules for Databricks classic cluster boostrapping artifacts
- egressTo:
    operations:
      - serviceName: storage.googleapis.com
        methodSelectors:
          - method: google.storage.objects.get
    resources:
      - projects/121886670913  # Databricks regional control plane, shown here for us-east4
  egressFrom:
    identityType: ANY_IDENTITY # vpc sc for whatever reason does not capture the identity for these storage API calls, please note that we are making a read or a get call and nothing else

