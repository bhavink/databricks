# app.yaml — AI Auth Showcase
#
# Tab 1 — Genie + OBO (user authorization):
#   The Apps proxy injects the authenticated user's OAuth token as
#   'X-Forwarded-Access-Token'. app.py forwards it to Genie REST calls so
#   Unity Catalog enforces row filters / column masks per the calling user.
#
#   User OAuth scopes required for Tab 1 (configured on the account-level
#   OAuth integration, NOT in this file — there is no app.yaml scopes field):
#     - dashboards.genie  (Genie space access)
#     - genie             (Genie Conversation API — required on Azure)
#   Scope configuration (via account CLI — run once after any app delete+create):
#     databricks account custom-app-integration update 'e7594cff-ad76-4268-91db-b0689be2ec62' \
#       --profile adb-account \
#       --json '{"scopes":["offline_access","email","iam.current-user:read",
#                "openid","dashboards.genie","genie","iam.access-control:read",
#                "profile","model-serving","sql","unity-catalog"],
#               "user_authorized_scopes":["dashboards.genie","genie","model-serving","sql","unity-catalog"]}'
#
#   Additionally, configure User Authorization via the Databricks UI (Apps → Edit → Configure):
#     Add scopes: sql, dashboards.genie, serving.serving-endpoints, unity-catalog
#     This produces a real JWT with the scopes in the token's `scp` claim.
#     The CLI only sets user_authorized_scopes but NOT effective_user_api_scopes.
#
#   Scopes required per tab (no all-apis — use specific scopes only):
#     dashboards.genie + genie  → Tab 1 (Genie OBO User)
#     sql                       → Tab 4 (Custom MCP OBO User — UC row filters fire as human)
#     model-serving             → Tab 5 (Supervisor Agent OBO User)
#     unity-catalog             → Tab 6 (External MCP proxy — USE CONNECTION check)
#
# Tab 2 — Vector Search + M2M (app authorization):
#   The app SP's own credentials (DATABRICKS_CLIENT_ID / SECRET) are used
#   to query VS indexes and the FM serving endpoint. No user token is
#   forwarded — every user sees the same knowledge base content.
#
# Tab 3 — UC Functions + M2M (app authorization):
#   The app SP calls UC functions via a SQL warehouse using M2M credentials.
#   is_member() inside each function enforces group-based access control.
#
# resources block:
#   Declaring resources here auto-grants the app SP the listed permissions
#   on each app deploy — no manual IAM wiring needed for these resources.
#
#   What still requires manual grants (not coverable by the resources block):
#     GRANT USE CATALOG ON CATALOG authz_showcase TO `<SP_APP_ID>`;
#     GRANT USE SCHEMA  ON SCHEMA  authz_showcase.sales TO `<SP_APP_ID>`;
#     GRANT USE SCHEMA  ON SCHEMA  authz_showcase.knowledge_base TO `<SP_APP_ID>`;
#     GRANT USE SCHEMA  ON SCHEMA  authz_showcase.functions TO `<SP_APP_ID>`;
#     GRANT SELECT ON TABLE authz_showcase.sales.sales_reps TO `<SP_APP_ID>`;
#     GRANT SELECT ON TABLE authz_showcase.sales.opportunities TO `<SP_APP_ID>`;
#     GRANT SELECT ON TABLE authz_showcase.knowledge_base.product_docs TO `<SP_APP_ID>`;
#     GRANT SELECT ON TABLE authz_showcase.knowledge_base.sales_playbooks TO `<SP_APP_ID>`;
#     -- Group membership (for is_member() check in get_rep_quota):
#     databricks groups add-member authz_showcase_executives <SP_ID>

# startup.sh removes conflicting mlflow-skinny (pre-installed in Apps runtime)
# and force-reinstalls mlflow-tracing to restore shared namespace files.
command: ["bash", "startup.sh"]

env:
  - name: GENIE_SPACE_ID
    value: "01f117ff5bdd167daf9aed6baa32c4c8"
  - name: VS_INDEX
    value: "authz_showcase.knowledge_base.product_docs_index"
  - name: VS_INDEX_PB
    value: "authz_showcase.knowledge_base.sales_playbooks_index"
  - name: FM_ENDPOINT
    value: "databricks-meta-llama-3-3-70b-instruct"
  - name: SQL_WAREHOUSE
    value: "093d4ec27ed4bdee"
  - name: UC_FUNCTIONS_CATALOG
    value: "authz_showcase"
  - name: SUPERVISOR_ENDPOINT
    value: "mas-155f64f7-endpoint"
  # ── Tab 4: Custom MCP direct URL (OBO + M2M tools) ──────────────────────────
  - name: CUSTOM_MCP_URL
    value: "https://authz-showcase-custom-mcp-1516413757355523.3.azure.databricksapps.com/mcp"
  # ── Tab 6: External MCP connection names (UC governs access) ────────────────
  - name: GITHUB_CONN
    value: "authz_showcase_github_conn"
  - name: CUSTMCP_CONN
    value: "authz_showcase_custmcp_conn"
  # ── Tracing (Module B) — E2E observability ──────────────────────────────────
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Users/bhavin.kukadia@databricks.com/mas-155f64f7-dev-experiment"
  - name: MLFLOW_ENABLE_ASYNC_TRACE_LOGGING
    value: "true"
  - name: MLFLOW_ASYNC_TRACE_LOGGING_MAX_WORKERS
    value: "10"
  - name: MLFLOW_ASYNC_TRACE_LOGGING_MAX_QUEUE_SIZE
    value: "1000"
  - name: MLFLOW_TRACE_SAMPLING_RATIO
    value: "1.0"
  - name: SERVICE_NAME
    value: "app-a-frontend"
  - name: APP_VERSION
    value: "1.0.0"
  # ── Theme — Swiss Modern (UI only, no functional impact) ────────────────────
  - name: STREAMLIT_THEME_PRIMARY_COLOR
    value: "#cc3311"
  - name: STREAMLIT_THEME_BACKGROUND_COLOR
    value: "#ffffff"
  - name: STREAMLIT_THEME_SECONDARY_BACKGROUND_COLOR
    value: "#f4f3f0"
  - name: STREAMLIT_THEME_TEXT_COLOR
    value: "#111111"
  - name: STREAMLIT_THEME_FONT
    value: "sans serif"

resources:
  # ── Tab 1: Genie (OBO — user token forwarded; SP needs CAN_RUN to proxy) ──
  - genie:
      id: "01f117ff5bdd167daf9aed6baa32c4c8"
      permission: CAN_RUN          # Least privilege: start/run conversations

  # ── Tab 2: Vector Search indexes (M2M — SP queries both indexes) ──────────
  - vector_search_index:
      name: "authz_showcase.knowledge_base.product_docs_index"
      permission: CAN_SELECT       # Only permission available for VS indexes
  - vector_search_index:
      name: "authz_showcase.knowledge_base.sales_playbooks_index"
      permission: CAN_SELECT

  # ── Tab 2: Foundation Model endpoint (M2M — SP sends inference requests) ──
  - serving_endpoint:
      name: "databricks-meta-llama-3-3-70b-instruct"
      permission: CAN_QUERY        # Least privilege: send queries only

  # ── Tab 3: SQL Warehouse (M2M — SP executes UC function SELECT calls) ─────
  - sql_warehouse:
      id: "093d4ec27ed4bdee"
      permission: CAN_USE          # Least privilege: run queries only

  # ── Tab 3: UC Functions (M2M — SP calls all three functions) ──────────────
  - function:
      name: "authz_showcase.functions.get_rep_quota"
      permission: CAN_EXECUTE
  - function:
      name: "authz_showcase.functions.calculate_attainment"
      permission: CAN_EXECUTE
  - function:
      name: "authz_showcase.functions.recommend_next_action"
      permission: CAN_EXECUTE

  # ── Tab 5: Supervisor Agent endpoint (OBO — user token forwarded) ───────────
  - serving_endpoint:
      name: "mas-155f64f7-endpoint"
      permission: CAN_QUERY        # App SP can proxy queries; user OBO token enforces sub-agent auth
