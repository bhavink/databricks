# app.yaml — authz-showcase-custom-mcp
#
# Custom MCP server exposing three tools with two auth patterns:
#
#   OBO User (get_deal_approval_status, submit_deal_for_approval):
#     Best practice: "Use on behalf of user to ensure the user only sees
#     data they have access to." The user's OAuth token (forwarded by the
#     Streamlit app) executes SQL directly → UC row filters fire as the
#     human → audit trail records the human email, not the SP.
#
#   OBO SP / M2M (get_crm_sync_status):
#     Best practice: "Use on behalf of service principal to ensure the app
#     can access data regardless of user permissions." CRM sync is a
#     system-level query — individual user identity is not required.
#
# OAuth integration notes:
#   This app has authorization: disabled → the OAuth integration is dormant.
#   No user ever authenticates directly against this app's integration.
#   The user_authorized_scopes on this integration are irrelevant.
#   The App SP (DATABRICKS_CLIENT_ID/SECRET) is used only for M2M queries.
#   The user's token comes from the Streamlit app via two-proxy passthrough.

# startup.sh removes conflicting mlflow-skinny (pre-installed in Apps runtime)
# and force-reinstalls mlflow-tracing to restore shared namespace files.
command: ["bash", "startup.sh"]

# authorization: disabled so the Apps proxy does NOT strip/replace the
# Authorization header. The Streamlit app forwards the user's OAuth token
# as "Authorization: Bearer <token>" and this passes through unchanged.
# The user's X-Forwarded-Access-Token (with sql scope via User Auth)
# is used by OBO tools for direct SQL execution as the human user.
authorization: disabled

env:
  - name: SQL_WAREHOUSE_ID
    value: "093d4ec27ed4bdee"
  # ── Tracing (Module B) — same experiment as AppA ──────────────────────────
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Users/bhavin.kukadia@databricks.com/mas-155f64f7-dev-experiment"
  - name: MLFLOW_ENABLE_ASYNC_TRACE_LOGGING
    value: "true"
  - name: MLFLOW_ASYNC_TRACE_LOGGING_MAX_WORKERS
    value: "10"
  - name: MLFLOW_ASYNC_TRACE_LOGGING_MAX_QUEUE_SIZE
    value: "1000"
  - name: MLFLOW_TRACE_SAMPLING_RATIO
    value: "1.0"
  - name: SERVICE_NAME
    value: "app-b-mcp-server"
  - name: APP_VERSION
    value: "1.0.0"

resources:
  # SP needs warehouse access for M2M queries (get_crm_sync_status)
  - sql_warehouse:
      id: "093d4ec27ed4bdee"
      permission: CAN_USE
